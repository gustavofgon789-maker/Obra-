<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Aluguéis | 𝔒braí</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --deep-bg: #050706; --card-bg: #0f1412; --primary: #10b981; --text-muted: #64748b; --border: #1e2923; }
    body { font-family: 'Inter', sans-serif; background: var(--deep-bg); color: #fff; margin: 0; padding-bottom: 100px; }
    .header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
    .lista-alugueis { padding: 20px; }
    .card-aluguel { background: var(--card-bg); border-radius: 20px; padding: 15px; display: flex; align-items: center; margin-bottom: 15px; border: 1px solid var(--border); }
    .img-ferramenta { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; margin-right: 15px; }
    .info { flex-grow: 1; }
    .nome { font-weight: 700; font-size: 15px; margin: 0; }
    .meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .btn-contato { background: var(--primary); color: #000; text-decoration: none; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 800; }
    .vazio { text-align: center; padding: 50px 20px; color: var(--text-muted); }
    
    /* Footer igual aos outros */
    .app-footer { position: fixed; bottom: 0; width: 100%; background: rgba(5,7,6,0.95); height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
    .footer-item { text-decoration: none; color: var(--text-muted); font-size: 10px; text-align: center; flex: 1; }
  </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-weight:800">Meus Aluguéis</h2>
    <p style="font-size:12px; color:var(--text-muted); margin-top:5px">Histórico de ferramentas que você consultou</p>
</div>

<div id="listaAlugueis" class="lista-alugueis">
    </div>

<nav class="app-footer">
  <a href="index.html" class="footer-item">🏠<br>Início</a>
  <a href="meus-alugueis.html" class="footer-item" style="color:var(--primary)">📋<br>Aluguéis</a>
  <a href="perfil.html" class="footer-item">👤<br>Painel</a>
</nav>

<script>
    const lista = document.getElementById("listaAlugueis");
    const historico = JSON.parse(localStorage.getItem('meusAlugueis') || '[]');

    if (historico.length === 0) {
        lista.innerHTML = `<div class="vazio">Você ainda não solicitou nenhum aluguel.</div>`;
    } else {
        historico.forEach(item => {
            const card = document.createElement("div");
            card.className = "card-aluguel";
            card.innerHTML = `
                <img src="${item.imagem}" class="img-ferramenta">
                <div class="info">
                    <p class="nome">${item.nome}</p>
                    <span class="meta">Solicitado em: ${item.data}</span>
                </div>
                <a href="${item.linkWhats}" target="_blank" class="btn-contato">WhatsApp</a>
            `;
            lista.appendChild(card);
        });
    }
</script>
</body>
</html>
