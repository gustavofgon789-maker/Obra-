<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Aluguéis | 𝔒braí</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --deep-bg: #0a0f0d; --card-bg: #141a17; --primary: #10b981; 
      --text-main: #e2e8f0; --text-muted: #94a3b8; --border: #1e2923; 
    }
    body { font-family: 'Inter', sans-serif; background: var(--deep-bg); color: var(--text-main); margin: 0; padding-bottom: 120px; }
    
    .header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); }
    .lista-alugueis { padding: 20px; max-width: 500px; margin: 0 auto; }
    
    .card-aluguel { 
      background: var(--card-bg); border-radius: 20px; padding: 15px; 
      display: flex; align-items: center; margin-bottom: 15px; border: 1px solid var(--border);
      text-decoration: none; color: inherit; transition: 0.2s;
    }
    .card-aluguel:active { transform: scale(0.98); }
    
    .img-ferramenta { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; margin-right: 15px; border: 1px solid var(--border); }
    .info-aluguel { flex: 1; }
    .nome-ferramenta { font-weight: 800; font-size: 16px; margin-bottom: 4px; display: block; }
    .data-aluguel { font-size: 12px; color: var(--text-muted); display: block; }
    
    .vazio { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; }

    /* Bottom Nav Simétrica (Padrão Sênior) */
    .bottom-nav { 
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
      width: 90%; max-width: 420px; background: rgba(20, 26, 23, 0.98); 
      backdrop-filter: blur(20px); padding: 10px 0; border-radius: 25px; 
      display: flex; align-items: center; justify-content: space-around;
      border: 1px solid var(--border); z-index: 1000;
    }
    .nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 700; }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-weight:800; color:var(--primary)">Meus Aluguéis</h2>
    <p style="font-size:12px; color:var(--text-muted); margin-top:5px">Consultas recentes no WhatsApp</p>
</div>

<div id="listaAlugueis" class="lista-alugueis">
    </div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>HOME</a>
  <a href="meus-alugueis.html" class="nav-item active"><span class="nav-icon">📋</span>ALUGUÉIS</a>
  <a href="perfil.html" class="nav-item"><span class="nav-icon">👤</span>PERFIL</a>
</nav>

<script>
    function renderizarHistorico() {
        const lista = document.getElementById("listaAlugueis");
        const historico = JSON.parse(localStorage.getItem('meusAlugueis') || '[]');

        if (historico.length === 0) {
            lista.innerHTML = `<div class="vazio">Nenhum pedido recente encontrado.<br>As ferramentas que consultar aparecerão aqui.</div>`;
            return;
        }

        lista.innerHTML = "";
        historico.forEach(item => {
            const card = document.createElement("a");
            card.href = item.linkWhats; // Redireciona direto para o chat salvo
            card.target = "_blank";
            card.className = "card-aluguel";
            card.innerHTML = `
                <img src="${item.imagem}" class="img-ferramenta">
                <div class="info-aluguel">
                    <span class="nome-ferramenta">${item.nome}</span>
                    <span class="data-aluguel">Solicitado em: ${item.data}</span>
                    <span style="color:var(--primary); font-size:11px; font-weight:700">Reabrir conversa →</span>
                </div>
            `;
            lista.appendChild(card);
        });
    }

    renderizarHistorico();
</script>
</body>
</html>
