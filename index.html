<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Obraí</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --deep-bg: #050706; --card-bg: #0f1412; --primary: #10b981;
      --primary-soft: rgba(16, 185, 129, 0.1); --danger: #ef4444;
      --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #64748b; --border: #1e2923;
    }
    body { font-family: 'Inter', sans-serif; background: var(--deep-bg); margin: 0; color: var(--text-main); padding-bottom: 110px; }
    
    /* Overlay de Login para quando não estiver logado */
    #login-overlay { position: fixed; inset: 0; background: var(--deep-bg); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    .btn-google { background: white; color: black; padding: 15px 25px; border-radius: 15px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; }

    .profile-header { text-align: center; padding: 40px 20px 20px; }
    .profile-img { width: 80px; height: 80px; border-radius: 24px; border: 2px solid var(--primary); padding: 3px; object-fit: cover; }
    .business-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 20px; }
    .stat-box { background: var(--card-bg); padding: 18px; border-radius: 22px; border: 1px solid var(--border); }
    .stat-box.full { grid-column: span 2; background: linear-gradient(135deg, var(--card-bg) 0%, #10b9810a 100%); text-align: center; }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 5px; display: block; }
    .stat-value { font-size: 22px; font-weight: 800; }
    .money-value { color: var(--primary); font-size: 26px; }
    .section-title { padding: 10px 20px; font-size: 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    .item-anuncio { background: var(--card-bg); border-radius: 22px; padding: 14px; display: flex; align-items: center; margin-bottom: 12px; border: 1px solid var(--border); }
    .item-img { width: 65px; height: 65px; border-radius: 14px; object-fit: cover; margin-right: 15px; }
    .item-info { flex-grow: 1; min-width: 0; }
    .item-nome { font-weight: 700; font-size: 15px; margin: 0 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-badge { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; display: inline-block; margin-right: 5px; }
    .status-on { background: var(--primary-soft); color: var(--primary); }
    .status-off { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .item-ganho { font-size: 11px; color: var(--text-muted); display: block; margin-top: 4px; }
    .acoes-anuncio { display: flex; gap: 6px; margin-left: 10px; }
    .btn-circle { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: #161b19; color: white; text-decoration: none; font-size: 14px; cursor: pointer; }
    #modalReserva { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-content { background: var(--card-bg); width: 85%; max-width: 340px; padding: 25px; border-radius: 28px; border: 1px solid var(--border); text-align: center; }
    .btn-main { background: var(--primary); color: #000; border: none; width: 100%; padding: 15px; border-radius: 14px; font-weight: 800; margin-top: 15px; cursor: pointer; }
    .btn-sair { display: block; margin: 20px; padding: 15px; text-align: center; color: var(--danger); border: 1px solid rgba(239,68,68,0.15); border-radius: 18px; text-decoration: none; font-weight: 700; font-size: 13px; }
    .app-footer { position: fixed; bottom: 0; width: 100%; background: rgba(5,7,6,0.95); height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
    .footer-item { text-decoration: none; color: var(--text-muted); font-size: 10px; text-align: center; }
  </style>
</head>
<body>

<div id="login-overlay">
    <h1 style="color:var(--primary); font-weight:800; margin-bottom:30px">𝔒braí</h1>
    <button class="btn-google" onclick="fazerLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
        Entrar com Google
    </button>
</div>

<div class="profile-header">
    <img id="userPhoto" src="" class="profile-img" onerror="this.src='https://via.placeholder.com/100?text=👤'">
    <h2 id="userName" style="margin:10px 0 0; font-size: 20px;">Carregando...</h2>
</div>

<div class="business-stats">
    <div class="stat-box full">
        <span class="stat-label">💰 Receita Real Acumulada</span>
        <span class="stat-value money-value" id="ganhoValor">R$ 0,00</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">🛠️ Ativos</span>
        <span class="stat-value" id="countAnuncios">0</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">⭐ Avaliação</span>
        <span class="stat-value" style="color:var(--warning)">5.0</span>
    </div>
</div>

<div class="section-title">
    <span>Gerenciar Inventário</span>
    <button onclick="window.location.href='anunciar.html'" style="background:var(--primary-soft); border:none; color:var(--primary); padding:6px 12px; border-radius:8px; font-weight:800; font-size:11px;">+ ADICIONAR</button>
</div>

<div id="listaMeusAnuncios" class="meus-anuncios"></div>

<a href="#" id="btnSair" class="btn-sair">Desconectar Conta</a>

<nav class="app-footer">
  <a href="index.html" class="footer-item">🏠<br>Início</a>
  <a href="anunciar.html" style="background:var(--primary); color:#000; width:48px; height:48px; border-radius:16px; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:24px; font-weight:bold; margin-bottom:20px">+</a>
  <a href="perfil.html" class="footer-item" style="color:var(--primary)">👤<br>Painel</a>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBLvvoNS4VF2Y0rOh-dHj3GFiwao1D4KYU",
    authDomain: "obrai-56278.firebaseapp.com",
    projectId: "obrai-56278",
    storageBucket: "obrai-56278.firebasestorage.app",
    messagingSenderId: "735990959965",
    appId: "1:735990959965:web:d28f6cbc7b85abfd48e2b4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // FUNÇÃO DE LOGIN QUE FALTAVA
  window.fazerLogin = async () => {
    const provider = new GoogleAuthProvider();
    try {
        await signInWithPopup(auth, provider);
    } catch (error) {
        alert("Erro ao logar: " + error.message);
    }
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("login-overlay").style.display = "none";
      document.getElementById("userName").innerText = user.displayName || 'Parceiro Obraí';
      document.getElementById("userPhoto").src = user.photoURL || '';
      carregarDashboard(user.uid);
    } else {
      // EM VEZ DE REDIRECIONAR PARA LOGIN.HTML, MOSTRA O OVERLAY
      document.getElementById("login-overlay").style.display = "flex";
    }
  });

  async function carregarDashboard(userId) {
    const lista = document.getElementById("listaMeusAnuncios");
    const qAnuncios = query(collection(db, "anuncios"), where("userId", "==", userId));
    const snapAnuncios = await getDocs(qAnuncios);
    
    lista.innerHTML = "";
    let receitaGeral = 0;

    snapAnuncios.forEach((docSnap) => {
      const item = docSnap.data();
      const div = document.createElement("div");
      div.className = "item-anuncio";
      div.innerHTML = `
        <img src="${item.imagem}" class="item-img">
        <div class="item-info">
          <p class="item-nome">${item.nome}</p>
          <span class="status-badge status-on">● DISPONÍVEL</span>
          <span class="item-ganho">Preço: R$ ${item.preco}</span>
        </div>
      `;
      lista.appendChild(div);
    });

    document.getElementById("countAnuncios").innerText = snapAnuncios.size;
  }

  document.getElementById("btnSair").onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
