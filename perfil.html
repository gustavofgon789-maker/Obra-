<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Obraí</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --deep-bg: #0a0f0d; --card-bg: #141a17; --primary: #10b981;
      --text-main: #e2e8f0; --text-muted: #94a3b8; --border: #1e2923; --danger: #ef4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--deep-bg); margin: 0; color: var(--text-main); padding-bottom: 120px; }
    
    .profile-header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%); }
    .user-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 10px; object-fit: cover; }
    
    .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
    .stat-val { display: block; font-size: 20px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    .sessao-titulo { padding: 0 25px; font-size: 18px; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .minha-ferramenta { background: var(--card-bg); margin: 0 20px 12px; padding: 15px; border-radius: 20px; display: flex; align-items: center; border: 1px solid var(--border); }
    .tool-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; margin-right: 15px; }
    .tool-info { flex: 1; }
    .btn-action { background: var(--border); border: none; color: white; padding: 8px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; margin-left: 5px; }
    .btn-danger { color: var(--danger); }

    /* Modal Estilizado */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; box-sizing: border-box; }
    .modal-content { background: var(--card-bg); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; border: 1px solid var(--border); }

    /* Bottom Nav Simétrica (Igual às outras páginas) */
    .bottom-nav { 
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
      width: 90%; max-width: 420px; background: rgba(20, 26, 23, 0.98); 
      backdrop-filter: blur(20px); padding: 10px 0; border-radius: 25px; 
      display: flex; align-items: center; justify-content: space-around;
      border: 1px solid var(--border); z-index: 1000;
    }
    .nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 700; }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>

<div class="profile-header">
  <img id="userFoto" src="https://via.placeholder.com/80" class="user-img">
  <h2 id="userName" style="margin:0">Carregando...</h2>
  <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-size:12px; margin-top:10px; cursor:pointer">Sair da Conta</button>
</div>

<div class="stats-container">
  <div class="stat-card">
    <span class="stat-val" id="totalAnuncios">0</span>
    <span class="stat-label">Anúncios</span>
  </div>
  <div class="stat-card">
    <span class="stat-val" id="ganhoValor">R$ 0,00</span>
    <span class="stat-label">Estimativa</span>
  </div>
</div>

<div class="sessao-titulo">Minhas Ferramentas</div>
<div id="minhasFerramentas"></div>

<div id="modalReserva" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0">Bloquear Agenda</h3>
    <p style="font-size:13px; color:var(--text-muted)">Selecione os dias que a ferramenta NÃO estará disponível.</p>
    <input type="text" id="calendarioBloqueio" style="width:100%; padding:12px; background:#000; border:1px solid var(--border); color:white; border-radius:10px; margin-bottom:15px">
    <button id="btnSalvarBloqueio" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:12px; font-weight:700; margin-bottom:10px">Salvar Bloqueio</button>
    <button id="btnLimpar" style="width:100%; padding:10px; background:none; border:none; color:var(--text-muted)">Limpar Agenda</button>
    <button onclick="fecharModal()" style="width:100%; margin-top:10px; color:var(--danger); background:none; border:none">Cancelar</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>HOME</a>
  <a href="meus-alugueis.html" class="nav-item"><span class="nav-icon">📋</span>ALUGUÉIS</a>
  <a href="perfil.html" class="nav-item active"><span class="nav-icon">👤</span>PERFIL</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, doc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBLvvoNS4VF2Y0rOh-dHj3GFiwao1D4KYU",
    authDomain: "obrai-56278.firebaseapp.com",
    projectId: "obrai-56278",
    storageBucket: "obrai-56278.firebasestorage.app",
    messagingSenderId: "735990959965",
    appId: "1:735990959965:web:d28f6cbc7b85abfd48e2b4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let idSelecionado = null;
  let datasSelecionadas = [];
  const fp = flatpickr("#calendarioBloqueio", { mode: "range", locale: "pt", theme: "dark", onChange: (ds) => datasSelecionadas = ds });

  onAuthStateChanged(auth, (user) => {
    if (!user) return window.location.href = "login.html";
    document.getElementById("userName").innerText = user.displayName;
    document.getElementById("userFoto").src = user.photoURL || "https://via.placeholder.com/80";
    carregarDados(user.uid);
  });

  async function carregarDados(uid) {
    const q = query(collection(db, "anuncios"), where("uid", "==", uid));
    const snap = await getDocs(q);
    const container = document.getElementById("minhasFerramentas");
    container.innerHTML = "";
    
    let total = 0;
    let receita = 0;

    snap.forEach(d => {
      total++;
      const item = d.data();
      receita += (parseFloat(item.preco) || 0) * 10; // Estimativa de 10 dias/mês
      
      const div = document.createElement("div");
      div.className = "minha-ferramenta";
      div.innerHTML = `
        <img src="${item.imagem}" class="tool-img">
        <div class="tool-info">
          <span style="font-weight:700; display:block">${item.nome}</span>
          <span style="font-size:12px; color:var(--text-muted)">R$ ${item.preco}/dia</span>
        </div>
        <button class="btn-action" onclick="abrirModal('${d.id}')">📅</button>
        <button class="btn-action btn-danger" onclick="removerAnuncio('${d.id}')">🗑️</button>
      `;
      container.appendChild(div);
    });

    document.getElementById("totalAnuncios").innerText = total;
    document.getElementById("ganhoValor").innerText = `R$ ${receita.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  }

  window.abrirModal = (id) => { idSelecionado = id; document.getElementById("modalReserva").style.display = "flex"; };
  window.fecharModal = () => { document.getElementById("modalReserva").style.display = "none"; fp.clear(); };

  document.getElementById("btnSalvarBloqueio").onclick = async () => {
    if (datasSelecionadas.length < 2) return alert("Selecione o período.");
    await addDoc(collection(db, "reservas"), {
      id_ferramenta: idSelecionado,
      inicio: datasSelecionadas[0].toISOString().split('T')[0],
      fim: datasSelecionadas[1].toISOString().split('T')[0]
    });
    alert("Agenda atualizada!");
    fecharModal();
  };

  window.removerAnuncio = async (id) => {
    if (confirm("Deseja remover este anúncio permanentemente?")) {
      await deleteDoc(doc(db, "anuncios", id));
      location.reload();
    }
  };

  window.logout = () => signOut(auth).then(() => location.href = "index.html");
</script>
</body>
</html>
