<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Obraí | Professional</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --deep-bg: #050706; --card-bg: #0f1412; --primary: #10b981;
      --primary-soft: rgba(16, 185, 129, 0.1); --danger: #ef4444;
      --text-main: #f8fafc; --text-muted: #64748b; --border: #1e2923;
    }
    body { font-family: 'Inter', sans-serif; background: var(--deep-bg); margin: 0; color: var(--text-main); padding-bottom: 120px; }
    
    .profile-header { text-align: center; padding: 40px 20px 20px; }
    .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary); padding: 3px; object-fit: cover; }

    /* Balões de Informação */
    .info-container { padding: 0 20px; margin-bottom: 20px; }
    .balloon { background: var(--card-bg); border: 1px solid var(--border); border-radius: 22px; padding: 20px; margin-bottom: 15px; position: relative; }
    .balloon-label { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
    
    .balloon textarea, .balloon input { 
      width: 100%; background: transparent; border: none; color: var(--text-main); 
      font-family: inherit; font-size: 14px; outline: none; resize: none;
    }
    .balloon textarea:disabled, .balloon input:disabled { color: var(--text-muted); opacity: 0.9; }

    .btn-edit-inside { 
      position: absolute; top: 15px; right: 15px; background: var(--primary-soft); 
      color: var(--primary); border: none; padding: 6px 12px; border-radius: 10px; 
      font-size: 11px; font-weight: 800; cursor: pointer; 
    }
    .btn-edit-inside.active { background: var(--primary); color: #000; }

    .btn-maps-blue { 
      background: #4285F4; color: white; border: none; padding: 10px 15px; 
      border-radius: 12px; font-size: 12px; font-weight: 800; margin-top: 12px; 
      cursor: pointer; display: none; width: 100%;
    }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 25px; }
    .stat-card { background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
    .stat-val { display: block; font-size: 22px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

    .btn-new-tool { 
      margin: 0 20px 30px; background: var(--primary); color: #000; 
      padding: 16px; border-radius: 18px; text-align: center; text-decoration: none; 
      display: block; font-weight: 800; font-size: 15px; box-shadow: 0 10px 20px rgba(16,185,129,0.2);
    }

    /* Lista de Gestão */
    .item-gestao { background: var(--card-bg); margin: 0 20px 12px; border-radius: 22px; padding: 15px; display: flex; align-items: center; border: 1px solid var(--border); }
    .item-img { width: 60px; height: 60px; border-radius: 14px; object-fit: cover; margin-right: 15px; }
    .item-info { flex: 1; min-width: 0; }
    .item-nome { font-weight: 700; font-size: 15px; margin-bottom: 4px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-status { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 6px; background: var(--primary-soft); color: var(--primary); }

    .item-actions { display: flex; gap: 8px; margin-left: 10px; }
    .btn-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #161b19; border: 1px solid var(--border); color: #fff; cursor: pointer; text-decoration: none; }

    /* Nav */
    .app-footer { position: fixed; bottom: 0; width: 100%; background: rgba(5,7,6,0.98); height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
    .footer-item { text-decoration: none; color: var(--text-muted); font-size: 10px; text-align: center; font-weight: 700; }
  </style>
</head>
<body>

<div class="profile-header">
    <img id="userPhoto" src="" class="profile-img">
    <h2 id="userName" style="margin:10px 0 5px; font-size: 22px; font-weight: 800;">---</h2>
    <div style="color: #fbbf24; font-size: 12px;">★★★★★ <span style="color:var(--text-muted)">(Parceiro Oficial)</span></div>
</div>

<div class="info-container">
    <div class="balloon">
        <button id="btnEdit" class="btn-edit-inside" onclick="toggleEdit()">Editar Perfil</button>
        <span class="balloon-label">Sobre o Anunciante</span>
        <textarea id="userBio" rows="2" placeholder="Descreva sua experiência..." disabled></textarea>
    </div>

    <div class="balloon">
        <span class="balloon-label">Localização (Bairro, Cidade)</span>
        <input id="userLocal" type="text" placeholder="Ex: Centro, São Paulo" disabled>
        <button id="btnMaps" class="btn-maps-blue" onclick="irParaMaps()">Ir para Maps</button>
    </div>
</div>

<div class="stats-row">
    <div class="stat-card">
        <span class="stat-val" id="countAnuncios">0</span>
        <span class="stat-label">Meus Itens</span>
    </div>
    <div class="stat-card">
        <span class="stat-val" id="ganhoValor" style="color:var(--primary)">R$ 0,00</span>
        <span class="stat-label">Ganhos Reais</span>
    </div>
</div>

<a href="anunciar.html" class="btn-new-tool">+ ANUNCIAR NOVA FERRAMENTA</a>

<div id="listaMeusAnuncios"></div>

<a href="#" onclick="logout()" style="display:block; text-align:center; color:var(--danger); font-size:12px; font-weight:700; margin: 20px 0 40px; text-decoration:none">DESCONECTAR CONTA</a>

<nav class="app-footer">
  <a href="index.html" class="footer-item">🏠<br>Início</a>
  <a href="meus-alugueis.html" class="footer-item">📋<br>Aluguéis</a>
  <a href="perfil.html" class="footer-item" style="color:var(--primary)">👤<br>Painel</a>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBLvvoNS4VF2Y0rOh-dHj3GFiwao1D4KYU",
    authDomain: "obrai-56278.firebaseapp.com",
    projectId: "obrai-56278",
    storageBucket: "obrai-56278.firebasestorage.app",
    messagingSenderId: "735990959965",
    appId: "1:735990959965:web:d28f6cbc7b85abfd48e2b4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let editMode = false;

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById("userName").innerText = user.displayName;
      document.getElementById("userPhoto").src = user.photoURL;
      
      const userRef = doc(db, "usuarios", user.uid);
      const userSnap = await getDoc(userRef);
      if(userSnap.exists()){
        document.getElementById("userBio").value = userSnap.data().bio || "";
        document.getElementById("userLocal").value = userSnap.data().local || "";
        if(userSnap.data().local) document.getElementById("btnMaps").style.display = "block";
      }
      carregarMeusAnuncios(user.uid);
    } else { window.location.href = "index.html"; }
  });

  window.toggleEdit = async () => {
    const bio = document.getElementById("userBio");
    const loc = document.getElementById("userLocal");
    const btn = document.getElementById("btnEdit");

    if(!editMode) {
      editMode = true; bio.disabled = loc.disabled = false;
      btn.innerText = "Salvar"; btn.classList.add("active"); bio.focus();
    } else {
      await setDoc(doc(db, "usuarios", auth.currentUser.uid), { bio: bio.value, local: loc.value }, { merge: true });
      editMode = false; bio.disabled = loc.disabled = true;
      btn.innerText = "Editar Perfil"; btn.classList.remove("active");
      if(loc.value) document.getElementById("btnMaps").style.display = "block";
    }
  };

  window.irParaMaps = () => {
    const local = document.getElementById("userLocal").value;
    window.open(`https://www.google.com/maps/search/${encodeURIComponent(local)}`, '_blank');
  };

  async function carregarMeusAnuncios(uid) {
    const lista = document.getElementById("listaMeusAnuncios");
    lista.innerHTML = `<p style="text-align:center; color:var(--text-muted)">Buscando seus anúncios...</p>`;
    
    // CORREÇÃO SÊNIOR: Buscamos todos e filtramos localmente para evitar erros de campo userId vs uid
    const snap = await getDocs(collection(db, "anuncios"));
    lista.innerHTML = "";
    
    let count = 0;
    let totalGanhos = 0;

    snap.forEach(docSnap => {
      const item = docSnap.data();
      // Verifica as duas possibilidades de campo de ID do dono
      if (item.uid === uid || item.userId === uid) {
        count++;
        const card = document.createElement("div");
        card.className = "item-gestao";
        card.innerHTML = `
          <img src="${item.imagem}" class="item-img">
          <div class="item-info">
            <span class="item-nome">${item.nome}</span>
            <span class="item-status">ATIVO</span>
          </div>
          <div class="item-actions">
            <a href="anunciar.html?edit=${docSnap.id}" class="btn-icon">✏️</a>
            <button class="btn-icon" style="color:var(--danger)" onclick="deletarAnuncio('${docSnap.id}')">🗑️</button>
          </div>
        `;
        lista.appendChild(card);
      }
    });

    document.getElementById("countAnuncios").innerText = count;
    if(count === 0) lista.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:20px">Nenhum anúncio encontrado.<br>Crie um novo acima! 🛠️</p>`;
  }

  window.deletarAnuncio = async (id) => {
    if(confirm("Deseja excluir este anúncio permanentemente?")) {
      await deleteDoc(doc(db, "anuncios", id));
      location.reload();
    }
  };

  window.logout = () => signOut(auth).then(() => location.href = "index.html");
</script>
</body>
</html>
