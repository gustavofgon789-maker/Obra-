<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Obraí | Gestão</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --deep-bg: #050706; --card-bg: #0f1412; --primary: #10b981;
      --primary-soft: rgba(16, 185, 129, 0.1); --danger: #ef4444;
      --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #64748b; --border: #1e2923;
    }
    body { font-family: 'Inter', sans-serif; background: var(--deep-bg); margin: 0; color: var(--text-main); padding-bottom: 110px; }
    
    /* Overlay de Login */
    #login-overlay { position: fixed; inset: 0; background: var(--deep-bg); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    .btn-google { background: white; color: black; padding: 15px 25px; border-radius: 15px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; }

    .profile-header { text-align: center; padding: 40px 20px 20px; }
    .profile-img { width: 80px; height: 80px; border-radius: 24px; border: 2px solid var(--primary); padding: 3px; object-fit: cover; }
    
    .business-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 20px; }
    .stat-box { background: var(--card-bg); padding: 18px; border-radius: 22px; border: 1px solid var(--border); }
    .stat-box.full { grid-column: span 2; text-align: center; }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
    .stat-value { font-size: 22px; font-weight: 800; }
    .money-value { color: var(--primary); }

    .section-title { padding: 10px 20px; font-size: 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }

    /* LISTA DE ANÚNCIOS COM BOTÕES */
    .item-anuncio { background: var(--card-bg); border-radius: 22px; padding: 14px; display: flex; align-items: center; margin: 0 20px 12px; border: 1px solid var(--border); }
    .item-img { width: 60px; height: 60px; border-radius: 14px; object-fit: cover; margin-right: 15px; }
    .item-info { flex-grow: 1; min-width: 0; }
    .item-nome { font-weight: 700; font-size: 14px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .acoes-anuncio { display: flex; gap: 8px; margin-left: 10px; }
    .btn-circle { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: #161b19; color: white; cursor: pointer; font-size: 16px; }

    /* MODAL AGENDA */
    #modalReserva { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-content { background: var(--card-bg); width: 85%; max-width: 340px; padding: 25px; border-radius: 28px; border: 1px solid var(--border); text-align: center; }
    .btn-main { background: var(--primary); color: #000; border: none; width: 100%; padding: 15px; border-radius: 14px; font-weight: 800; margin-top: 15px; cursor: pointer; }

    .app-footer { position: fixed; bottom: 0; width: 100%; background: rgba(5,7,6,0.95); height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
    .footer-item { text-decoration: none; color: var(--text-muted); font-size: 10px; text-align: center; }
  </style>
</head>
<body>

<div id="login-overlay">
    <h2 style="color:var(--primary)">Aceder ao Painel</h2>
    <button class="btn-google" onclick="fazerLogin()">Entrar com Google</button>
</div>

<div class="profile-header">
    <img id="userPhoto" src="" class="profile-img">
    <h2 id="userName" style="margin-top:10px">---</h2>
</div>

<div class="business-stats">
    <div class="stat-box full">
        <span class="stat-label">💰 Ganhos Estimados</span>
        <span class="stat-value money-value" id="ganhoValor">R$ 0,00</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">🛠️ Meus Itens</span>
        <span class="stat-value" id="countAnuncios">0</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">⭐ Avaliação</span>
        <span class="stat-value" style="color:var(--warning)">5.0</span>
    </div>
</div>

<div class="section-title">
    <span>O Meu Inventário</span>
    <button onclick="window.location.href='anunciar.html'" style="background:var(--primary); border:none; color:#000; padding:8px 15px; border-radius:10px; font-weight:800; font-size:11px;">+ NOVO</button>
</div>

<div id="listaMeusAnuncios"></div>

<a href="#" onclick="logout()" style="display:block; text-align:center; color:var(--danger); margin: 30px; text-decoration:none; font-weight:700">Sair da Conta</a>

<div id="modalReserva">
  <div class="modal-content">
    <h3 style="margin-top:0">Bloquear Datas</h3>
    <p style="font-size:12px; color:var(--text-muted)">Selecione os dias em que a ferramenta não estará disponível.</p>
    <input type="text" id="calendario" style="width:100%; padding:12px; background:#000; border:1px solid var(--border); color:#fff; border-radius:10px; text-align:center">
    <button class="btn-main" id="btnSalvarBloqueio">SALVAR BLOQUEIO</button>
    <button onclick="fecharModal()" style="background:none; border:none; color:var(--text-muted); margin-top:15px; cursor:pointer">Cancelar</button>
  </div>
</div>

<nav class="app-footer">
  <a href="index.html" class="footer-item">🏠<br>Início</a>
  <a href="perfil.html" class="footer-item" style="color:var(--primary)">👤<br>Painel</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBLvvoNS4VF2Y0rOh-dHj3GFiwao1D4KYU",
    authDomain: "obrai-56278.firebaseapp.com",
    projectId: "obrai-56278",
    storageBucket: "obrai-56278.firebasestorage.app",
    messagingSenderId: "735990959965",
    appId: "1:735990959965:web:d28f6cbc7b85abfd48e2b4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let idSelecionado = null;
  let datasSelecionadas = [];
  const fp = flatpickr("#calendario", { mode: "range", theme: "dark", onChange: (selectedDates) => { datasSelecionadas = selectedDates; } });

  window.fazerLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
  window.logout = () => signOut(auth).then(() => location.reload());

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("login-overlay").style.display = "none";
      document.getElementById("userName").innerText = user.displayName;
      document.getElementById("userPhoto").src = user.photoURL;
      carregarDashboard(user.uid);
    } else {
      document.getElementById("login-overlay").style.display = "flex";
    }
  });

  async function carregarDashboard(userId) {
    const lista = document.getElementById("listaMeusAnuncios");
    const q = query(collection(db, "anuncios"), where("userId", "==", userId));
    const snap = await getDocs(q);
    lista.innerHTML = "";
    
    snap.forEach(docSnap => {
      const item = docSnap.data();
      const id = docSnap.id;
      const card = document.createElement("div");
      card.className = "item-anuncio";
      // Localize essa parte dentro da função carregarDashboard
card.innerHTML = `
  <img src="${item.imagem}" class="item-img">
  <div class="item-info">
    <p class="item-nome">${item.nome}</p>
    
    <span class="status-badge ${item.status === 'Em Uso' ? 'status-off' : 'status-on'}">
      ● ${item.status || 'Disponível'}
    </span>
    
    <span style="font-size:11px; color:var(--text-muted); display:block; margin-top:4px;">
      R$ ${item.preco}
    </span>
  </div>
  <div class="acoes-anuncio">
    <button class="btn-circle" onclick="abrirModal('${id}')">📅</button>
    <button class="btn-circle" onclick="window.location.href='editar.html?id=${id}'">✏️</button>
    <button class="btn-circle" style="color:var(--danger)" onclick="removerAnuncio('${id}')">🗑️</button>
  </div>
`;
      lista.appendChild(card);
    });
    document.getElementById("countAnuncios").innerText = snap.size;
  }

  window.abrirModal = (id) => { idSelecionado = id; document.getElementById("modalReserva").style.display = "flex"; };
  window.fecharModal = () => { document.getElementById("modalReserva").style.display = "none"; };

  window.removerAnuncio = async (id) => {
    if (confirm("Deseja eliminar este anúncio?")) {
      await deleteDoc(doc(db, "anuncios", id));
      location.reload();
    }
  };

  document.getElementById("btnSalvarBloqueio").onclick = async () => {
    if (datasSelecionadas.length < 2) return alert("Selecione o intervalo de datas.");
    await addDoc(collection(db, "reservas"), {
      id_ferramenta: idSelecionado,
      inicio: datasSelecionadas[0].toISOString().split('T')[0],
      fim: datasSelecionadas[1].toISOString().split('T')[0]
    });
    alert("Datas bloqueadas!");
    fecharModal();
  };
</script>
</body>
</html>
